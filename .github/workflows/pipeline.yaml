name: ci pipeline

on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubantu-latest
  
  steps: 
    -name: Checkout Code
      uses: actions/checkout@v5
   
    -name: Set up Node.jobs
     uses: actions/setup-node@v3
     with:
       node-version: 16.x

    -name: Install dependencies
      run: npm install

    -name: Run tests
      run: npm test
